  <script>
    // create a canvas element
    const canvas = document.getElementById("canvas1");
    const ctx = canvas.getContext("2d");
    // set canvas size
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    // load the face image
    const face = new Image();
    face.src = "img/face.png";
    // draw the iamge with canvas
    face.onload = function () {
      // get the aspect ratio of the image
      const ratio = face.width / face.height;
      // a/b = c/d --> c = a/b * d
      // fit the image to the canvas maintaining the aspect ratio
      // desaturate the image

      // create a circle mask for the image
      ctx.beginPath();
      ctx.arc(canvas.width / 4, canvas.height / 4, 200, 0, 2 * Math.PI);
      ctx.clip();
      // draw the image
      ctx.drawImage(face, 0, 0, canvas.width / 2, canvas.height / 2);
      // move the canvas to the center of the screen
      canvas.style.top = "10%";
    }


  </script>
