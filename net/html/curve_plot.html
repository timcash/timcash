    <script>
      // create a canvas element
      const canvas = document.getElementById("stage1");
      const ctx = canvas.getContext("2d");
      // set canvas width and height
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      // convert polar to cartesian coordinates
      function polarToCartesian(r, theta) {
        return {
          x: r * Math.cos(theta),
          y: r * Math.sin(theta),
        };
      }

      // convert cartesian to polar coordinates
      function cartesianToPolar(x, y) {
        return {
          r: Math.sqrt(x * x + y * y),
          theta: Math.atan2(y, x),
        };
      }

      // given float:0-1 return hsl:0-360
      function hsl(h_01, opacity) {
        return `hsla(${h_01 * 360}, 100%, 50%, ${opacity})`;
      }

      // {start, end, color} => dra {
      function drawLine(line) {
        // add center to line.start and line.end
        const start = {
          x: line.start.x + center.x,
          y: line.start.y + center.y,
        };
        const end = {
          x: line.end.x + center.x,
          y: line.end.y + center.y,
        };

        ctx.beginPath();
        ctx.moveTo(start.x, start.y);
        ctx.lineTo(end.x, end.y);
        ctx.strokeStyle = line.color;
        ctx.stroke();
        ctx.closePath();
      }

      // given number:x in xmin-xmax scale to x-ymin-ymax scale
      function scale(x, xmin, xmax, ymin, ymax) {
        return ((x - xmin) / (xmax - xmin)) * (ymax - ymin) + ymin;
      }

      // given t return a point on a bezier curve
      function bezier(t, p0, p1, p2, p3) {
        const x =
          (1 - t) ** 3 * p0.x +
          3 * (1 - t) ** 2 * t * p1.x +
          3 * (1 - t) * t ** 2 * p2.x +
          t ** 3 * p3.x;
        const y =
          (1 - t) ** 3 * p0.y +
          3 * (1 - t) ** 2 * t * p1.y +
          3 * (1 - t) * t ** 2 * p2.y +
          t ** 3 * p3.y;
        return {
          x,
          y,
        };
      }

      // world center coordinates at half the canvas width and height
      const center = {
        x: canvas.width / 2,
        y: canvas.height / 2,
      };

      function drawDots(elapsed) {
        // create the 4 points of a square lentgh 20
        const p0 = { x: -200, y: 0 };
        const p1 = { x: -200, y: 200 };
        const p2 = { x: 200, y: 200 };
        const p3 = { x: 200, y: 0 };
        const t = (elapsed % 1000) / 1000;
        const p = bezier(t, p1, p0, p3, p2);
        const x = p.x + center.x;
        const y = p.y + center.y;
        const o = scale(y, 0, 200, 0, 1);

        // get a random number between 10 and 100
        const r = Math.random() * (15 - 10) + 10;
        // draw a 5px dot at p
        ctx.beginPath();
        ctx.arc(x, y, r, 0, 2 * Math.PI);
        ctx.fillStyle = hsl(t, o);
        ctx.fill();
        ctx.closePath();
      }

      let prev_frame_number = -1;
      let start, previousTimeStamp;
      let done = false;

      const frames_per_second = 60;
      const ms_per_second = 1000;

      // create diagonal gradient from black to dark grey
      const gradient = ctx.createLinearGradient(
        canvas.width,
        canvas.height,
        0,
        0
      );
      gradient.addColorStop(0, "#000");
      gradient.addColorStop(0.5, "#000");
      gradient.addColorStop(1, "#111");
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // start a request animation frame loop
      async function step(timestamp) {
        if (start === undefined) {
          start = timestamp;
        }
        const elapsed = timestamp - start; // in milliseconds
        const frame_number = Math.floor(elapsed / 60);
        if (frame_number > prev_frame_number) {
          // draw dots
          drawDots(elapsed);
          prev_frame_number = frame_number;
        }
        window.requestAnimationFrame(step);
      }

      window.requestAnimationFrame(step);
    </script>
  </body>
